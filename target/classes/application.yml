spring:
  application:
    name: backend
  datasource:
    url: jdbc:mysql://localhost:3306/banking?useSSL=false&serverTimezone=UTC
    username: root
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 60000
    refresh-expiration-ms: 60000
  fx:
    usd-to-ils: 3.70
